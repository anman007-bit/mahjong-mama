name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: получить код
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: установить Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 3: установить системные зависимости для Buildozer
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential libltdl-dev

      # Шаг 4: установить Buildozer и Cython
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      # Шаг 5: собрать APK
      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      # Шаг 6: загрузить APK как артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-apk
          path: bin/*.apk
          if-no-files-found: error
